<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>商家登录 - Merchant Hub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{colors:{"primary":"#a04100","primary-container":"#ff6b00","on-primary":"#ffffff","on-primary-container":"#572000","surface":"#f9f9f9","on-surface":"#1a1c1c","secondary":"#5f5e5e","on-surface-variant":"#5a4136","surface-container-low":"#f3f3f3","surface-container-lowest":"#ffffff","outline-variant":"#e2bfb0","outline":"#8e7164","error":"#ba1a1a"}}}}</script>
<style>
  body { font-family:'Work Sans',sans-serif; background:#f9f9f9; min-height:100dvh; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
</style>
</head>
<body class="flex flex-col min-h-screen">

<!-- 语言切换 -->
<button id="lang-toggle" onclick="I18N.toggle()"
  class="fixed top-4 right-4 z-50 w-10 h-10 rounded-full bg-white border border-orange-200 text-primary font-bold text-sm shadow-sm">EN</button>

<!-- 背景装饰 -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
  <div class="absolute -top-24 -right-12 w-96 h-96 rounded-full bg-orange-100 opacity-30 blur-3xl"></div>
  <div class="absolute -bottom-16 -left-16 w-72 h-72 rounded-full bg-amber-100 opacity-30 blur-3xl"></div>
</div>

<main class="flex-grow flex items-center justify-center px-4 py-10 relative z-10">
  <div class="w-full max-w-[420px]">

    <!-- Header -->
    <div class="text-center mb-8">
      <a href="../index.html" class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-container shadow-lg shadow-orange-200 mb-4">
        <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings:'FILL' 1,'wght' 600">storefront</span>
      </a>
      <h1 class="text-2xl font-black text-primary" style="font-family:'Plus Jakarta Sans',sans-serif">Merchant Hub</h1>
      <p class="text-secondary text-sm mt-1" data-zh="商家管理平台" data-en="Merchant Management Platform">商家管理平台</p>
    </div>

    <!-- 登录卡片 -->
    <div class="bg-white rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,0.06)] border border-orange-50 p-8">
      <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm flex items-center gap-2">
        <span class="material-symbols-outlined text-base">error</span>
        <span id="error-text"></span>
      </div>

      <form id="login-form" class="space-y-5" onsubmit="doLogin(event)">
        <!-- 账号 -->
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-on-surface-variant ml-1" data-zh="账号 / 手机号" data-en="Account / Phone">账号 / 手机号</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-xl">person</span>
            <input id="phone" type="text" value="13800000001"
              class="w-full bg-surface-container-low border-none rounded-xl py-3.5 pl-10 pr-4 text-sm focus:ring-2 focus:ring-orange-300 transition-all"
              data-ph-zh="请输入账号或手机号" data-ph-en="Enter account or phone" placeholder="请输入账号或手机号"/>
          </div>
        </div>

        <!-- 密码 -->
        <div class="space-y-1.5">
          <div class="flex justify-between items-center px-1">
            <label class="text-xs font-semibold text-on-surface-variant" data-zh="密码" data-en="Password">密码</label>
            <a href="#" class="text-xs font-semibold text-primary hover:opacity-80" data-zh="忘记密码?" data-en="Forgot password?">忘记密码?</a>
          </div>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-xl">lock</span>
            <input id="password" type="password" value="demo123"
              class="w-full bg-surface-container-low border-none rounded-xl py-3.5 pl-10 pr-12 text-sm focus:ring-2 focus:ring-orange-300 transition-all"
              data-ph-zh="请输入登录密码" data-ph-en="Enter password" placeholder="请输入登录密码"/>
            <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-secondary transition-colors">
              <span id="pwd-eye" class="material-symbols-outlined text-xl">visibility</span>
            </button>
          </div>
        </div>

        <!-- 登录按钮 -->
        <button type="submit"
          class="w-full bg-primary-container text-white font-bold text-base py-4 rounded-xl shadow-md shadow-orange-200 hover:opacity-90 active:scale-[.98] transition-all">
          <span data-zh="登 录" data-en="Sign In">登 录</span>
        </button>
      </form>

      <!-- 分割线 -->
      <div class="relative my-6 text-center">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-orange-100"></div></div>
        <span class="relative px-3 bg-white text-xs text-secondary uppercase tracking-wider" data-zh="其他方式" data-en="Other options">其他方式</span>
      </div>

      <!-- 验证码登录 -->
      <button onclick="smsLogin()"
        class="w-full flex items-center justify-center gap-2 py-3 border border-orange-200 rounded-xl text-sm text-on-surface-variant hover:bg-orange-50 transition-colors">
        <span class="material-symbols-outlined text-xl">sms</span>
        <span data-zh="验证码登录" data-en="SMS Code Login">验证码登录</span>
      </button>

      <p class="text-center text-sm text-secondary mt-5">
        <span data-zh="还没有账号？" data-en="No account?">还没有账号？</span>
        <a href="#" class="font-semibold text-primary ml-1 hover:underline" data-zh="立即注册" data-en="Register">立即注册</a>
      </p>
    </div>

    <!-- 演示提示 -->
    <div class="mt-4 p-3 bg-orange-50 rounded-xl border border-orange-100 text-xs text-secondary text-center">
      <span data-zh="演示账号: 13800000001 / demo123" data-en="Demo: 13800000001 / demo123">演示账号: 13800000001 / demo123</span>
    </div>

    <p class="text-center text-xs text-secondary mt-4 opacity-60">
      <span data-zh="登录即代表同意" data-en="By signing in you agree to">登录即代表同意</span>
      <a href="#" class="underline" data-zh="服务协议" data-en="Terms">服务协议</a>
      <span data-zh="和" data-en="and"> 和 </span>
      <a href="#" class="underline" data-zh="隐私政策" data-en="Privacy Policy">隐私政策</a>
    </p>
  </div>
</main>

<script src="../db.js"></script>
<script>
  // 检查 DB 是否加载成功
  if (typeof DB === 'undefined') {
    document.body.innerHTML = '<div style="max-width:600px;margin:100px auto;padding:40px;background:#fff3cd;border:2px solid #ffc107;border-radius:16px;text-align:center;font-family:sans-serif;">' +
      '<h2 style="color:#856404;margin-bottom:20px;">⚠️ 文件加载失败</h2>' +
      '<p style="color:#856404;line-height:1.8;margin-bottom:20px;">Safari 浏览器在直接打开本地 HTML 文件时，可能无法加载 JavaScript 文件。</p>' +
      '<p style="color:#856404;font-weight:bold;margin-bottom:20px;">请使用以下方法之一：</p>' +
      '<ol style="text-align:left;color:#856404;line-height:2;margin:0 auto;max-width:400px;">' +
      '<li>使用 Chrome 或 Firefox 浏览器打开</li>' +
      '<li>使用本地服务器运行（如 python -m http.server）</li>' +
      '<li>在 Safari 中启用"开发"菜单 → "停用本地文件限制"</li>' +
      '</ol>' +
      '</div>';
    throw new Error('DB not loaded');
  }
  
  DB.init();
  I18N.applyAll();

  function togglePwd() {
    const inp = document.getElementById('password');
    const eye = document.getElementById('pwd-eye');
    if (inp.type === 'password') { inp.type = 'text'; eye.textContent = 'visibility_off'; }
    else { inp.type = 'password'; eye.textContent = 'visibility'; }
  }

  function showError(msg) {
    const box = document.getElementById('error-msg');
    document.getElementById('error-text').textContent = msg;
    box.classList.remove('hidden');
  }

  function doLogin(e) {
    e.preventDefault();
    
    const phone = document.getElementById('phone').value.trim();
    const pwd = document.getElementById('password').value;
    
    const m = DB.loginMerchant(phone, pwd);
    
    if (m) {
      if (!m.store_id) {
        showError(I18N.lang === 'zh' ? '数据异常，请联系管理员' : 'Data error, please contact admin');
        return;
      }
      window.location.href = 'orders.html';
    } else {
      showError(I18N.lang === 'zh' ? '账号或密码错误' : 'Invalid account or password');
    }
  }

  function smsLogin() {
    alert(I18N.lang === 'zh' ? '演示版本暂不支持短信登录' : 'SMS login not available in demo');
  }
</script>
</body>
</html>
