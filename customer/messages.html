<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>站内短信 - 振华商城</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{colors:{"primary":"#a04100","primary-container":"#ff6b00","on-primary":"#ffffff","surface":"#f9f9f9","on-surface":"#1a1c1c","secondary":"#5f5e5e"}}}}</script>
<style>
  body{font-family:'Work Sans',sans-serif;background:#f9f9f9;min-height:100dvh;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
</style>
</head>
<body class="bg-surface text-on-surface pb-24">

<header class="sticky top-0 z-50 bg-white/95 backdrop-blur shadow-sm flex justify-between items-center px-4 py-3">
  <button onclick="history.back()" class="p-1"><span class="material-symbols-outlined text-primary">arrow_back</span></button>
  <h1 class="flex-1 text-center font-semibold text-on-surface text-sm">站内短信</h1>
  <button onclick="markAllAsRead()" class="text-xs text-primary-container font-semibold">全部已读</button>
</header>

<main class="max-w-screen-md mx-auto p-4">
  
  <!-- 未读消息统计 -->
  <div id="unread-summary" class="bg-gradient-to-r from-orange-500 to-amber-600 rounded-2xl p-4 shadow-lg text-white mb-4">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-white/80 text-xs font-semibold">未读消息</p>
        <p id="unread-count" class="font-black text-3xl mt-1">0</p>
      </div>
      <span class="material-symbols-outlined text-white/30 text-6xl" style="font-variation-settings:'FILL' 1">mail</span>
    </div>
  </div>

  <!-- 消息列表 -->
  <div id="messages-list" class="space-y-3">
    <div class="text-center py-20 text-secondary">加载中...</div>
  </div>

</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 py-2 bg-white/95 backdrop-blur border-t border-orange-50 shadow-lg z-50" id="customer-bottom-nav"></nav>

<script src="../db.js"></script>
<script src="_nav.js"></script>
<script>
  DB.init();
  
  const user = DB.getCurrentUser();
  if (!user) {
    window.location.href = 'login.html';
    throw new Error('Not logged in');
  }
  
  renderCustomerNav('profile');
  updateCartBadge();
  
  // 检查并生成提醒
  DB.checkAndCreateTrialReminders(user.id);
  
  function renderMessages() {
    const notifications = DB.getNotifications(user.id);
    const unreadCount = DB.getUnreadNotificationCount(user.id);
    
    // 更新未读数量
    document.getElementById('unread-count').textContent = unreadCount;
    
    const list = document.getElementById('messages-list');
    
    if (!notifications.length) {
      list.innerHTML = '<div class="text-center py-20 text-secondary">暂无消息</div>';
      return;
    }
    
    const typeIcons = {
      trial_reminder_3days: { icon: 'schedule', color: 'bg-blue-500' },
      trial_reminder_1day: { icon: 'notifications_active', color: 'bg-orange-500' },
      trial_reminder_today: { icon: 'priority_high', color: 'bg-red-500' },
      promotion: { icon: 'local_offer', color: 'bg-green-500' },
      system: { icon: 'info', color: 'bg-gray-500' }
    };
    
    list.innerHTML = notifications.map(n => {
      const iconInfo = typeIcons[n.type] || { icon: 'mail', color: 'bg-primary-container' };
      
      return `
      <div onclick="readMessage(${n.id})" class="bg-white rounded-2xl p-4 shadow-sm border ${n.is_read ? 'border-gray-100' : 'border-orange-200'} cursor-pointer hover:shadow-md transition-all active:scale-[0.98]">
        <div class="flex items-start gap-3">
          <div class="w-12 h-12 rounded-full ${n.is_read ? 'bg-gray-200' : iconInfo.color} flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined text-white text-xl">${iconInfo.icon}</span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between gap-2 mb-2">
              <h4 class="font-bold text-sm ${n.is_read ? 'text-secondary' : 'text-on-surface'}">${n.title}</h4>
              ${!n.is_read ? '<span class="w-2 h-2 bg-red-500 rounded-full flex-shrink-0 mt-1"></span>' : ''}
            </div>
            <p class="text-xs ${n.is_read ? 'text-secondary' : 'text-on-surface'} mb-3 leading-relaxed">${n.content}</p>
            <div class="flex items-center justify-between">
              <p class="text-xs text-secondary">${new Date(n.created_at).toLocaleString()}</p>
              ${!n.is_read ? '<span class="text-xs bg-red-500 text-white px-2 py-0.5 rounded-full font-bold">未读</span>' : '<span class="text-xs text-secondary">已读</span>'}
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  
  window.readMessage = function(notificationId) {
    const notification = DB.markNotificationAsRead(notificationId);
    if (notification && notification.action_url) {
      window.location.href = notification.action_url;
    } else {
      renderMessages();
    }
  };
  
  window.markAllAsRead = function() {
    DB.markAllNotificationsAsRead(user.id);
    renderMessages();
  };
  
  renderMessages();
</script>
</body>
</html>
