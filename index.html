<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vibrant Commerce</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{colors:{"primary":"#a04100","primary-container":"#ff6b00","on-primary":"#ffffff","on-primary-container":"#572000","surface":"#f9f9f9","on-surface":"#1a1c1c","secondary":"#5f5e5e","surface-container-low":"#f3f3f3","surface-container-lowest":"#ffffff","outline-variant":"#e2bfb0","tertiary":"#8c5000"}}}}</script>
<style>
  body { font-family:'Work Sans',sans-serif; background:#f9f9f9; min-height:100dvh; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  .card-hover { transition: transform .2s, box-shadow .2s; }
  .card-hover:active { transform: scale(.97); }
</style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen px-4">

<!-- 语言切换 -->
<button id="lang-toggle" onclick="I18N.toggle()"
  class="fixed top-4 right-4 z-50 w-10 h-10 rounded-full bg-white border border-orange-200 text-primary font-bold text-sm shadow-sm">
  EN
</button>

<!-- 背景装饰 -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
  <div class="absolute -top-20 -right-20 w-80 h-80 rounded-full bg-orange-100 opacity-40 blur-3xl"></div>
  <div class="absolute -bottom-20 -left-20 w-64 h-64 rounded-full bg-amber-100 opacity-40 blur-3xl"></div>
</div>

<div class="relative z-10 w-full max-w-sm">
  <!-- Logo -->
  <div class="text-center mb-10">
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-primary-container shadow-lg shadow-orange-200 mb-4">
      <span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings:'FILL' 1,'wght' 600">storefront</span>
    </div>
    <h1 class="text-3xl font-black text-primary" style="font-family:'Plus Jakarta Sans',sans-serif">
      <span data-zh="振华商城" data-en="Vibrant Store">振华商城</span>
    </h1>
    <p class="text-secondary text-sm mt-1" data-zh="积分核销 · 品质生活" data-en="Points & Rewards · Quality Life">积分核销 · 品质生活</p>
  </div>

  <!-- 入口卡片 -->
  <div class="space-y-4">
    <!-- 客户入口 -->
    <a href="customer/login.html"
      class="card-hover flex items-center gap-4 p-5 bg-white rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.06)] border border-orange-50">
      <div class="w-14 h-14 rounded-2xl bg-orange-50 flex items-center justify-center flex-shrink-0">
        <span class="material-symbols-outlined text-primary-container text-3xl" style="font-variation-settings:'FILL' 1,'wght' 500">person</span>
      </div>
      <div class="flex-1">
        <p class="font-bold text-on-surface text-lg" data-zh="顾客入口" data-en="Customer">顾客入口</p>
        <p class="text-secondary text-sm" data-zh="浏览商品 · 积分兑换 · 订单查询" data-en="Shop · Redeem Points · Orders">浏览商品 · 积分兑换 · 订单查询</p>
      </div>
      <span class="material-symbols-outlined text-orange-300">chevron_right</span>
    </a>

    <!-- 商家入口 -->
    <a href="merchant/login.html"
      class="card-hover flex items-center gap-4 p-5 bg-primary-container rounded-2xl shadow-[0_4px_20px_rgba(255,107,0,0.25)]">
      <div class="w-14 h-14 rounded-2xl bg-white/20 flex items-center justify-center flex-shrink-0">
        <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings:'FILL' 1,'wght' 500">store</span>
      </div>
      <div class="flex-1">
        <p class="font-bold text-white text-lg" data-zh="商家入口" data-en="Merchant">商家入口</p>
        <p class="text-white/80 text-sm" data-zh="订单管理 · 核销 · 结算" data-en="Orders · Verify · Settlement">订单管理 · 核销 · 结算</p>
      </div>
      <span class="material-symbols-outlined text-white/60">chevron_right</span>
    </a>

    <!-- 运维入口 -->
    <a href="admin/login.html"
      class="card-hover flex items-center gap-4 p-5 bg-gradient-to-r from-blue-500 to-indigo-600 rounded-2xl shadow-[0_4px_20px_rgba(79,70,229,0.25)]">
      <div class="w-14 h-14 rounded-2xl bg-white/20 flex items-center justify-center flex-shrink-0">
        <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings:'FILL' 1,'wght' 500">admin_panel_settings</span>
      </div>
      <div class="flex-1">
        <p class="font-bold text-white text-lg" data-zh="运维人员" data-en="Admin">运维人员</p>
        <p class="text-white/80 text-sm" data-zh="用户管理 · 商铺管理 · 系统配置" data-en="Users · Stores · Config">用户管理 · 商铺管理 · 系统配置</p>
      </div>
      <span class="material-symbols-outlined text-white/60">chevron_right</span>
    </a>
  </div>

  <!-- 底部说明 -->
  <div class="text-center mt-8 space-y-2">
    <!-- 数据状态指示器 -->
    <div id="data-status" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-green-50 border border-green-200 text-xs">
      <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
      <span class="text-green-700 font-medium" data-zh="数据已就绪" data-en="Data Ready">数据已就绪</span>
    </div>
    <p class="text-xs text-secondary opacity-60" data-zh="本地演示版本 · 数据存储于设备" data-en="Local Demo · Data stored on device">本地演示版本 · 数据存储于设备</p>
    <button onclick="resetDatabase()" class="text-xs text-primary underline hover:text-primary-container">
      <span data-zh="重置数据库" data-en="Reset Database">重置数据库</span>
    </button>
  </div>
</div>

<script src="db.js"></script>
<script>
  // 初始化数据库
  DB.init();
  I18N.applyAll();
  
  // 检查数据状态
  function checkDataStatus() {
    const users = DB.findAll('users');
    const statusEl = document.getElementById('data-status');
    
    if (users && users.length > 0) {
      // 数据已就绪
      statusEl.innerHTML = `
        <span class="w-2 h-2 rounded-full bg-green-500"></span>
        <span class="text-green-700 font-medium">${I18N.t('数据已就绪', 'Data Ready')} (${users.length} ${I18N.t('个用户', 'users')})</span>
      `;
      statusEl.className = 'inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-green-50 border border-green-200 text-xs';
    } else {
      // 数据未初始化
      statusEl.innerHTML = `
        <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
        <span class="text-red-700 font-medium">${I18N.t('数据未初始化', 'Data Not Initialized')}</span>
      `;
      statusEl.className = 'inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-red-50 border border-red-200 text-xs';
      
      // 自动尝试重新初始化
      console.warn('数据未初始化，尝试重新初始化...');
      setTimeout(() => {
        DB.reset();
        location.reload();
      }, 1000);
    }
  }
  
  // 页面加载完成后检查数据状态
  setTimeout(checkDataStatus, 100);
  
  function resetDatabase() {
    if (confirm(I18N.t('确定要重置数据库吗？这将清除所有数据并恢复初始状态。', 'Reset database? This will clear all data and restore initial state.'))) {
      DB.reset();
      alert(I18N.t('数据库已重置！', 'Database reset!'));
      location.reload();
    }
  }
</script>
</body>
</html>
